<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="献立">
<title>献立プランナー</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Zen+Kaku+Gothic+New:wght@700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F7F4EF;
  --card: #FFFFFF;
  --primary: #D4622A;
  --primary-light: #F9E4D8;
  --secondary: #3D6B5E;
  --secondary-light: #D0E6DF;
  --accent: #C49A2B;
  --text: #1E1E1E;
  --text-sub: #8A8A8A;
  --border: #E8E2D9;
  --shadow-sm: 0 1px 6px rgba(0,0,0,0.06);
  --shadow: 0 3px 16px rgba(0,0,0,0.09);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.13);
  --radius: 18px;
  --radius-sm: 10px;
  --staple-c: #6B4FA0; --staple-bg: #EEE8F8;
  --main-c: #C0392B;   --main-bg: #FDECEA;
  --side-c: #2E7D4F;   --side-bg: #E8F6EE;
  --soup-c: #B8770A;   --soup-bg: #FEF6E0;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:72px;overscroll-behavior:none;}

/* ── HEADER ── */
.header{
  background:var(--card);border-bottom:1px solid var(--border);
  padding:12px 18px 10px;position:sticky;top:0;z-index:100;
}
.header-row{display:flex;align-items:center;justify-content:space-between;}
.app-logo{font-family:'Zen Kaku Gothic New',sans-serif;font-size:20px;font-weight:900;color:var(--primary);letter-spacing:-0.5px;}
.app-logo span{color:var(--text-sub);font-size:11px;font-weight:400;margin-left:6px;font-family:'Noto Sans JP';}
.people-row{display:flex;align-items:center;gap:6px;background:var(--bg);padding:5px 10px;border-radius:10px;}
.people-lbl{font-size:11px;color:var(--text-sub);}
.p-btn{width:24px;height:24px;border-radius:50%;border:none;background:var(--primary);color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;}
.p-cnt{font-size:16px;font-weight:700;min-width:20px;text-align:center;}
.p-unit{font-size:11px;color:var(--text-sub);}

/* ── TABS ── */
.tabs{display:flex;gap:3px;background:var(--bg);border-radius:12px;padding:3px;margin:10px 14px;}
.tab{flex:1;padding:8px 4px;text-align:center;font-size:11px;font-weight:500;border-radius:9px;border:none;background:transparent;color:var(--text-sub);cursor:pointer;transition:all .2s;line-height:1.3;}
.tab.active{background:var(--card);color:var(--primary);font-weight:700;box-shadow:var(--shadow-sm);}

/* ── CONTENT ── */
.pane{padding:0 14px;display:none;}
.pane.active{display:block;}

/* ── SETUP CARD ── */
.setup-card{background:var(--card);border-radius:var(--radius);padding:14px;margin-bottom:10px;box-shadow:var(--shadow-sm);}
.setup-label{font-size:11px;font-weight:700;color:var(--text-sub);margin-bottom:8px;letter-spacing:.3px;}
.tag-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;}
.tag{padding:5px 11px;border-radius:20px;font-size:12px;font-weight:500;border:1.5px solid var(--border);background:#fff;color:var(--text-sub);cursor:pointer;transition:all .15s;user-select:none;}
.tag.on{border-color:var(--primary);background:var(--primary-light);color:var(--primary);}
.txt-in{width:100%;padding:9px 12px;border-radius:var(--radius-sm);border:1.5px solid var(--border);font-size:13px;font-family:'Noto Sans JP',sans-serif;outline:none;background:var(--bg);color:var(--text);}
.txt-in:focus{border-color:var(--primary);}

/* ── PROPOSE BTN ── */
.propose-btn{
  width:100%;padding:14px;background:var(--primary);color:#fff;
  border:none;border-radius:var(--radius);font-size:15px;font-weight:700;
  font-family:'Noto Sans JP',sans-serif;cursor:pointer;margin-bottom:14px;
  box-shadow:0 4px 18px rgba(212,98,42,.38);transition:all .2s;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.propose-btn:active{transform:scale(.98);}
.propose-btn:disabled{opacity:.6;pointer-events:none;}

/* ── LOADING ── */
.loading-box{display:none;text-align:center;padding:48px 20px;color:var(--text-sub);}
.loading-box.show{display:block;}
.spin{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .75s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-msg{font-size:13px;margin-bottom:6px;}
.loading-sub{font-size:11px;color:var(--text-sub);}

/* ── DAY CARD ── */
.day-card{background:var(--card);border-radius:var(--radius);margin-bottom:10px;box-shadow:var(--shadow-sm);overflow:hidden;}
.day-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--secondary-light);cursor:pointer;user-select:none;}
.day-hdr-l{display:flex;align-items:center;gap:10px;}
.day-badge{width:34px;height:34px;border-radius:9px;background:var(--secondary);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;}
.day-main{font-size:13px;font-weight:700;}
.day-sub{font-size:11px;color:var(--text-sub);margin-top:2px;}
.chev{font-size:13px;color:var(--text-sub);transition:transform .2s;}
.chev.open{transform:rotate(180deg);}
.day-body{padding:8px 14px 12px;}
.course-row{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);}
.course-row:last-child{border-bottom:none;}
.c-badge{min-width:36px;padding:2px 5px;border-radius:5px;font-size:10px;font-weight:700;text-align:center;flex-shrink:0;margin-top:1px;}
.cb-staple{background:var(--staple-bg);color:var(--staple-c);}
.cb-main  {background:var(--main-bg);  color:var(--main-c);}
.cb-side  {background:var(--side-bg);  color:var(--side-c);}
.cb-soup  {background:var(--soup-bg);  color:var(--soup-c);}
.c-info{flex:1;cursor:pointer;}
.c-name{font-size:13px;font-weight:500;line-height:1.4;}
.c-time{font-size:11px;color:var(--text-sub);margin-top:2px;}
.c-tap{font-size:10px;color:var(--primary);margin-top:1px;}
.re-btn{background:none;border:1.5px solid var(--border);border-radius:7px;padding:4px 7px;font-size:11px;color:var(--text-sub);cursor:pointer;white-space:nowrap;flex-shrink:0;}

/* ── PREP TAB ── */
.prep-progress{background:var(--card);border-radius:var(--radius);padding:12px 14px;margin-bottom:12px;box-shadow:var(--shadow-sm);}
.prog-lbl{font-size:11px;color:var(--text-sub);display:flex;justify-content:space-between;margin-bottom:6px;}
.prog-bar{height:7px;background:var(--border);border-radius:4px;overflow:hidden;}
.prog-fill{height:100%;background:var(--secondary);border-radius:4px;transition:width .4s;}
.prep-sec{margin-bottom:16px;}
.prep-sec-ttl{font-size:12px;font-weight:700;color:var(--secondary);display:flex;align-items:center;gap:6px;margin-bottom:7px;padding-left:2px;}
.prep-sec-ttl::before{content:'';display:block;width:3px;height:14px;background:var(--secondary);border-radius:2px;}
.prep-item{background:var(--card);border-radius:12px;padding:11px 13px;margin-bottom:7px;box-shadow:var(--shadow-sm);display:flex;align-items:flex-start;gap:10px;}
.prep-chk{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;background:#fff;margin-top:1px;}
.prep-chk.done{background:var(--secondary);border-color:var(--secondary);}
.prep-chk.done::after{content:'✓';color:#fff;font-size:13px;font-weight:700;}
.prep-body{flex:1;}
.prep-daybadge{display:inline-block;font-size:10px;font-weight:700;padding:1px 7px;border-radius:8px;background:#E8F6EE;color:var(--secondary);margin-bottom:3px;}
.prep-title{font-size:13px;font-weight:700;margin-bottom:2px;}
.prep-title.done{text-decoration:line-through;color:var(--text-sub);}
.prep-desc{font-size:12px;color:var(--text-sub);line-height:1.6;}

/* ── SHOPPING TAB ── */
.shop-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.shop-ttl{font-size:16px;font-weight:700;}
.copy-btn{padding:8px 14px;background:var(--secondary);color:#fff;border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer;transition:background .2s;}
.copy-btn.done{background:#3A8A4A;}
.cat-sec{margin-bottom:14px;}
.cat-lbl{font-size:11px;font-weight:700;color:var(--text-sub);margin-bottom:6px;padding-left:2px;}
.shop-item{background:var(--card);border-radius:var(--radius-sm);padding:9px 13px;margin-bottom:5px;display:flex;justify-content:space-between;align-items:center;box-shadow:var(--shadow-sm);}
.si-name{font-size:13px;font-weight:500;}
.si-amt{font-size:12px;color:var(--text-sub);font-weight:500;}

/* ── BOTTOM SHEET ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0);z-index:200;pointer-events:none;transition:background .3s;}
.overlay.open{background:rgba(0,0,0,.48);pointer-events:all;}
.bsheet{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--card);border-radius:22px 22px 0 0;
  z-index:201;max-height:88vh;
  transform:translateY(100%);
  transition:transform .35s cubic-bezier(.32,.72,0,1);
  display:flex;flex-direction:column;
}
.bsheet.open{transform:translateY(0);}
.bs-handle-area{padding:10px 20px 0;flex-shrink:0;}
.bs-handle{width:34px;height:4px;border-radius:2px;background:var(--border);margin:0 auto 10px;}
.bs-hdr{padding:0 20px 12px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.bs-hdr-info{flex:1;}
.bs-cbadge{display:inline-block;padding:2px 9px;border-radius:9px;font-size:11px;font-weight:700;margin-bottom:4px;}
.bs-title{font-size:18px;font-weight:700;line-height:1.3;}
.bs-meta{display:flex;gap:10px;margin-top:4px;}
.bs-meta span{font-size:12px;color:var(--text-sub);}
.bs-close{width:28px;height:28px;border-radius:50%;background:var(--bg);border:none;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.bs-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;padding:0 20px;}
.bs-tab{padding:10px 14px;font-size:13px;font-weight:500;border:none;background:none;cursor:pointer;color:var(--text-sub);border-bottom:2px solid transparent;transition:all .2s;margin-bottom:-1px;}
.bs-tab.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:700;}
.bs-body{overflow-y:auto;flex:1;padding:16px 20px 40px;-webkit-overflow-scrolling:touch;}
.ing-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;}
.ing-row:last-child{border-bottom:none;}
.ing-name{font-weight:500;}
.ing-amt{color:var(--text-sub);}
.step-item{display:flex;gap:11px;margin-bottom:14px;}
.step-num{width:26px;height:26px;border-radius:50%;background:var(--primary);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.step-txt{font-size:13px;line-height:1.75;flex:1;}
.step-tip{margin-top:6px;padding:6px 10px;background:#FEF5EE;border-left:3px solid var(--primary);border-radius:0 6px 6px 0;font-size:12px;color:#B04A1A;}
.pt-card{background:var(--primary-light);border-radius:12px;padding:12px 14px;}
.pt-row{display:flex;gap:8px;margin-bottom:8px;font-size:13px;line-height:1.6;}
.pt-row:last-child{margin-bottom:0;}

/* ── API KEY SCREEN ── */
.apikey-screen{
  position:fixed;inset:0;background:var(--bg);z-index:300;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:32px 24px;
}
.apikey-screen.hidden{display:none;}
.ak-logo{font-family:'Zen Kaku Gothic New',sans-serif;font-size:28px;font-weight:900;color:var(--primary);margin-bottom:6px;}
.ak-sub{font-size:13px;color:var(--text-sub);margin-bottom:28px;text-align:center;}
.ak-card{background:var(--card);border-radius:var(--radius);padding:20px;width:100%;max-width:360px;box-shadow:var(--shadow);}
.ak-lbl{font-size:13px;font-weight:700;margin-bottom:8px;}
.ak-input{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-family:'Noto Sans JP',sans-serif;outline:none;background:var(--bg);}
.ak-input:focus{border-color:var(--primary);}
.ak-hint{font-size:11px;color:var(--text-sub);margin-top:6px;line-height:1.6;}
.ak-btn{width:100%;margin-top:16px;padding:13px;background:var(--primary);color:#fff;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer;box-shadow:0 4px 14px rgba(212,98,42,.35);}
.ak-change{font-size:12px;color:var(--text-sub);text-align:center;margin-top:8px;cursor:pointer;text-decoration:underline;}

/* ── TOAST ── */
.toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%) translateY(16px);background:#1E1E1E;color:#fff;padding:9px 18px;border-radius:20px;font-size:13px;font-weight:500;opacity:0;transition:all .3s;z-index:400;white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── EMPTY ── */
.empty{text-align:center;padding:48px 20px;color:var(--text-sub);font-size:14px;}
.empty-icon{font-size:36px;margin-bottom:10px;}

/* ── ERROR ── */
.err-box{background:#FEE;border:1.5px solid #F99;border-radius:12px;padding:12px 14px;margin-bottom:12px;font-size:13px;color:#C0392B;display:none;}
.err-box.show{display:block;}
</style>
</head>
<body>

<!-- APIキー設定画面 -->
<div class="apikey-screen" id="apikeyScreen">
  <div class="ak-logo">🍽 献立プランナー</div>
  <div class="ak-sub">Anthropic APIキーを設定してください</div>
  <div class="ak-card">
    <div class="ak-lbl">APIキー</div>
    <input class="ak-input" type="password" id="akInput" placeholder="sk-ant-..." autocomplete="off">
    <div id="ak-err" style="display:none;color:#C0392B;font-size:12px;margin-top:6px;"></div><div class="ak-hint">キーはこの端末のみに保存されます。<br>他の人と共有されることはありません。</div>
    <button class="ak-btn" onclick="saveApiKey()">保存して始める</button>
  </div>
</div>

<!-- メイン -->
<div class="header">
  <div class="header-row">
    <div class="app-logo">🍽 献立プランナー <span>v1</span></div>
    <div class="people-row">
      <span class="people-lbl">人数</span>
      <button class="p-btn" onclick="chgPeople(-1)">−</button>
      <span class="p-cnt" id="peopleCnt">3</span>
      <span class="p-unit">人</span>
      <button class="p-btn" onclick="chgPeople(1)">＋</button>
    </div>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('menu',this)">📅 今週の献立</button>
  <button class="tab" onclick="switchTab('prep',this)">🧊 週末仕込み</button>
  <button class="tab" onclick="switchTab('shop',this)">🛒 買い物</button>
</div>

<!-- 献立タブ -->
<div class="pane active" id="pane-menu">
  <div class="setup-card">
    <div class="setup-label">🎯 条件</div>
    <div class="tag-row">
      <div class="tag on" onclick="togTag(this)" data-v="30分以内">⏱ 30分以内</div>
      <div class="tag on" onclick="togTag(this)" data-v="子供向け">👧 子供向け</div>
      <div class="tag" onclick="togTag(this)" data-v="野菜多め">🥗 野菜多め</div>
      <div class="tag" onclick="togTag(this)" data-v="節約重視">💰 節約</div>
      <div class="tag" onclick="togTag(this)" data-v="魚を増やす">🐟 魚多め</div>
      <div class="tag" onclick="togTag(this)" data-v="麺の日を増やす">🍝 麺多め</div>
    </div>
    <input class="txt-in" id="avoidIn" placeholder="苦手・アレルギー食材（例：セロリ、貝類）">
  </div>
  <div class="err-box" id="errBox"></div>
  <button class="propose-btn" id="proposeBtn" onclick="propose()">✨ 今週の献立を提案する</button>
  <div class="loading-box" id="loadBox">
    <div class="spin"></div>
    <div class="loading-msg">AIが今週の献立を考えています…</div>
    <div class="loading-sub">主食・主菜・副菜・汁物＋仕込みプランを生成中</div>
  </div>
  <div id="menuList"></div>
  <div style="text-align:right;margin-bottom:8px;">
    <span class="ak-change" onclick="showApiKeyScreen()">🔑 APIキーを変更</span>
  </div>
</div>

<!-- 週末仕込みタブ -->
<div class="pane" id="pane-prep">
  <div id="prepContent"><div class="empty"><div class="empty-icon">🧊</div>先に献立を提案してください</div></div>
</div>

<!-- 買い物タブ -->
<div class="pane" id="pane-shop">
  <div class="shop-hdr">
    <div class="shop-ttl">🛒 今週の買い物</div>
    <button class="copy-btn" id="copyBtn" onclick="copyAll()">📋 コピー</button>
  </div>
  <div id="shopList"><div class="empty"><div class="empty-icon">🛒</div>先に献立を提案してください</div></div>
</div>

<!-- オーバーレイ -->
<div class="overlay" id="overlay" onclick="closeSheet()"></div>

<!-- ボトムシート -->
<div class="bsheet" id="bsheet">
  <div class="bs-handle-area"><div class="bs-handle"></div></div>
  <div class="bs-hdr">
    <div class="bs-hdr-info">
      <div class="bs-cbadge" id="bs-cbadge"></div>
      <div class="bs-title" id="bs-title"></div>
      <div class="bs-meta">
        <span id="bs-time"></span>
        <span id="bs-ppl"></span>
      </div>
    </div>
    <button class="bs-close" onclick="closeSheet()">✕</button>
  </div>
  <div class="bs-tabs">
    <button class="bs-tab active" onclick="switchBsTab('ing',this)">材料</button>
    <button class="bs-tab" onclick="switchBsTab('steps',this)">作り方</button>
    <button class="bs-tab" onclick="switchBsTab('pts',this)">ポイント</button>
  </div>
  <div class="bs-body" id="bs-body"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ========== STATE ==========
let people = 3;
let openDays = {};
let prepChecked = {};
let currentData = null; // AIが返したJSONデータ
let currentRecipe = null;
let bsTab = 'ing';

// ========== STORAGE（localStorage優先・IDBフォールバック） ==========
const store = {
  get(key) {
    try { return Promise.resolve(localStorage.getItem('mplanner_' + key)); } catch(e) { return Promise.resolve(null); }
  },
  set(key, val) {
    try { localStorage.setItem('mplanner_' + key, val); return Promise.resolve(); } catch(e) { return Promise.resolve(); }
  }
};

// ========== INIT ==========
async function init() {
  const key = await store.get('apikey');
  if (key) {
    document.getElementById('apikeyScreen').classList.add('hidden');
  }
  const saved = await store.get('people');
  if (saved) { people = parseInt(saved) || 3; document.getElementById('peopleCnt').textContent = people; }
}
init();

// ========== API KEY ==========
async function saveApiKey() {
  const v = document.getElementById('akInput').value.trim();
  if (!v || v.length < 10) {
    document.getElementById('ak-err').textContent = 'APIキーを入力してください';
    document.getElementById('ak-err').style.display = 'block';
    return;
  }
  document.getElementById('ak-err').style.display = 'none';
  await store.set('apikey', v);
  document.getElementById('apikeyScreen').classList.add('hidden');
  setTimeout(() => showToast('✅ APIキーを保存しました'), 150);
}
function showApiKeyScreen() {
  document.getElementById('apikeyScreen').classList.remove('hidden');
}

// ========== PEOPLE ==========
async function chgPeople(d) {
  people = Math.max(1, Math.min(8, people + d));
  document.getElementById('peopleCnt').textContent = people;
  await store.set('people', people);
  if (currentData) renderShop();
}

// ========== TABS ==========
function switchTab(id, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
  document.getElementById('pane-' + id).classList.add('active');
}

// ========== TAG ==========
function togTag(el) { el.classList.toggle('on'); }

// ========== PROPOSE ==========
async function propose() {
  const apikey = await store.get('apikey');
  if (!apikey) { showApiKeyScreen(); return; }

  const tags = [...document.querySelectorAll('.tag.on')].map(t => t.dataset.v);
  const avoid = document.getElementById('avoidIn').value.trim();

  setLoading(true);
  hideErr();

  const prompt = `一週間分（月〜日）の夕食献立をJSON形式で返してください。

条件：人数${people}人、要望：${tags.join('、') || 'なし'}、除外食材：${avoid || 'なし'}
ルール：各日に主食・主菜・副菜・汁物の4品。主食は白米だけでなくパスタ・うどん・丼・パンなどバリエーションをつける。食材の使い回しを考慮する。

必ず以下のJSON構造のみを返してください。前置き・説明・マークダウン記法は一切不要です。{ で始めて } で終わること。

{"menus":[{"day":"月","staple":{"name":"白米"},"main":{"name":"豚の生姜焼き","time":"20分"},"side":{"name":"ほうれん草のお浸し","time":"10分"},"soup":{"name":"味噌汁","time":"5分"},"ingredients":[{"cat":"肉・魚","name":"豚ロース","base":200},{"cat":"野菜","name":"玉ねぎ","base":100}]},{"day":"火","staple":{"name":"白米"},"main":{"name":"鮭のホイル焼き","time":"25分"},"side":{"name":"きゅうりの酢の物","time":"10分"},"soup":{"name":"なめこの味噌汁","time":"5分"},"ingredients":[{"cat":"肉・魚","name":"生鮭","base":300}]}],"prep":{"makeAhead":[{"id":"p1","days":["木"],"title":"ひじきの煮物","desc":"日曜に仕込んでおくと木曜まで保存OK"}],"marinade":[{"id":"m1","days":["月"],"title":"豚肉の下味冷凍","desc":"ジップロックに豚肉＋醤油大1・みりん大1・生姜を入れて冷凍"}],"cut":[{"id":"c1","days":["水"],"title":"カレー用野菜カット","desc":"火曜夜にじゃがいも・にんじん・玉ねぎをカットして冷蔵保存"}]}}

上記はサンプルです。月〜日の7日分をすべて生成してください。ingredientsの数値は${people}人分のグラム数にしてください。`;

  try {
    let res;
    try {
      res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-api-key': apikey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
        body: JSON.stringify({ model: 'claude-sonnet-4-5', max_tokens: 4000, messages: [{ role: 'user', content: prompt }] })
      });
    } catch(fetchErr) {
      throw new Error('通信エラー: ' + fetchErr.message);
    }
    if (!res.ok) {
      let eb = {};
      try { eb = await res.json(); } catch(e) {}
      throw new Error('HTTPエラー ' + res.status + ': ' + (eb.error?.message || JSON.stringify(eb).slice(0,200)));
    }
    let data;
    try { data = await res.json(); } catch(e) { throw new Error('レスポンス解析失敗: ' + e.message); }
    const raw = (data.content?.[0]?.text || '').trim();
    if (!raw) throw new Error('応答が空です: ' + JSON.stringify(data).slice(0,200));
    const jsonMatch = raw.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error('JSON未検出。応答先頭: ' + raw.slice(0,120));
    let parsed;
    try { parsed = JSON.parse(jsonMatch[0]); } catch(e) { throw new Error('パース失敗: ' + e.message + ' 対象: ' + jsonMatch[0].slice(0,100)); }
    if (!parsed.menus || !parsed.menus.length) throw new Error('menus空: ' + JSON.stringify(parsed).slice(0,100));
    currentData = parsed;
    openDays = { 0: true };
    prepChecked = {};
    renderMenus();
    renderPrep();
    renderShop();
    showToast('✅ 今週の献立を提案しました！');
  } catch (e) {
    showErr(e.message || 'エラーが発生しました');
  } finally {
    setLoading(false);
  }
}

function setLoading(on) {
  document.getElementById('loadBox').classList.toggle('show', on);
  document.getElementById('proposeBtn').disabled = on;
  if (on) document.getElementById('menuList').innerHTML = '';
}
function showErr(msg) {
  const el = document.getElementById('errBox');
  el.textContent = '⚠️ ' + msg;
  el.classList.add('show');
}
function hideErr() { document.getElementById('errBox').classList.remove('show'); }

// ========== RENDER MENUS ==========
function renderMenus() {
  if (!currentData) return;
  const container = document.getElementById('menuList');
  container.innerHTML = currentData.menus.map((m, i) => {
    const isOpen = !!openDays[i];
    return `
    <div class="day-card">
      <div class="day-hdr" onclick="togDay(${i})">
        <div class="day-hdr-l">
          <div class="day-badge">${m.day}</div>
          <div>
            <div class="day-main">${m.main.name}</div>
            <div class="day-sub">${m.staple.name} ／ ${m.side.name} ／ ${m.soup.name}</div>
          </div>
        </div>
        <span class="chev ${isOpen?'open':''}">▼</span>
      </div>
      ${isOpen ? `<div class="day-body">
        ${cr('staple','主食',m.staple,i)} ${cr('main','主菜',m.main,i)}
        ${cr('side','副菜',m.side,i)} ${cr('soup','汁物',m.soup,i)}
      </div>` : ''}
    </div>`;
  }).join('');
}

function cr(type, label, course, i) {
  return `
  <div class="course-row">
    <span class="c-badge cb-${type}">${label}</span>
    <div class="c-info" onclick="openRecipe(${i},'${type}')">
      <div class="c-name">${course.name}</div>
      ${course.time ? `<div class="c-time">⏱ ${course.time}</div>` : ''}
      <div class="c-tap">タップでレシピ ↑</div>
    </div>
    <button class="re-btn" onclick="retryCourse(${i},'${type}');event.stopPropagation()">🔄</button>
  </div>`;
}

function togDay(i) { openDays[i] = !openDays[i]; renderMenus(); }

// ========== RETRY COURSE ==========
async function retryCourse(dayIdx, course) {
  const apikey = await store.get('apikey');
  if (!apikey) return;
  const m = currentData.menus[dayIdx];
  const courseLabel = {staple:'主食',main:'主菜',side:'副菜',soup:'汁物'}[course];
  showToast('🔄 変更中…');

  const prompt = `${m.day}曜日の${courseLabel}を1品提案してください。
現在の献立：主食:${m.staple.name} 主菜:${m.main.name} 副菜:${m.side.name} 汁物:${m.soup.name}
人数：${people}人
以下のJSON形式のみで返答（説明不要）:
{"name":"料理名","time":"調理時間（例:20分）"}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': apikey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({ model: 'claude-sonnet-4-5', max_tokens: 100, messages: [{ role: 'user', content: prompt }] })
    });
    const data = await res.json();
    const text = data.content[0].text.replace(/```json|```/g,'').trim();
    const obj = JSON.parse(text);
    currentData.menus[dayIdx][course] = obj;
    renderMenus();
    showToast(`✅ ${m.day}曜の${courseLabel}を変更しました`);
  } catch(e) { showToast('⚠️ 変更できませんでした'); }
}

// ========== RECIPE SHEET ==========
async function openRecipe(dayIdx, courseType) {
  const apikey = await store.get('apikey');
  if (!apikey) return;
  const m = currentData.menus[dayIdx];
  const course = m[courseType];
  const courseLabel = {staple:'主食',main:'主菜',side:'副菜',soup:'汁物'}[courseType];
  const courseBadgeClass = {staple:'cb-staple',main:'cb-main',side:'cb-side',soup:'cb-soup'}[courseType];

  document.getElementById('bs-cbadge').textContent = courseLabel;
  document.getElementById('bs-cbadge').className = 'bs-cbadge ' + courseBadgeClass;
  document.getElementById('bs-title').textContent = course.name;
  document.getElementById('bs-time').textContent = course.time ? '⏱ ' + course.time : '';
  document.getElementById('bs-ppl').textContent = '👥 ' + people + '人分';

  document.querySelectorAll('.bs-tab').forEach((t,i) => t.classList.toggle('active', i===0));
  bsTab = 'ing';
  document.getElementById('bs-body').innerHTML = '<div class="spin" style="margin:30px auto"></div>';

  document.getElementById('overlay').classList.add('open');
  document.getElementById('bsheet').classList.add('open');

  // AIにレシピを生成させる
  const prompt = `「${course.name}」のレシピを${people}人分で教えてください。
以下のJSON形式のみで返答（説明不要）:
{
  "ingredients": [{"name":"食材名","amount":"量（例:200g、大さじ1）"}],
  "steps": [{"text":"手順テキスト","tip":"調理のコツ（なければ空文字）"}],
  "points": ["ポイント1（絵文字+テキスト）","ポイント2","ポイント3"]
}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': apikey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({ model: 'claude-sonnet-4-5', max_tokens: 1000, messages: [{ role: 'user', content: prompt }] })
    });
    const data = await res.json();
    const text = data.content[0].text.replace(/```json|```/g,'').trim();
    currentRecipe = JSON.parse(text);
    renderBsBody('ing');
  } catch(e) {
    document.getElementById('bs-body').innerHTML = '<div style="color:#C0392B;padding:20px;font-size:13px;">レシピの取得に失敗しました</div>';
  }
}

function closeSheet() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('bsheet').classList.remove('open');
}

function switchBsTab(tab, el) {
  document.querySelectorAll('.bs-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  bsTab = tab;
  renderBsBody(tab);
  document.getElementById('bs-body').scrollTop = 0;
}

function renderBsBody(tab) {
  if (!currentRecipe) return;
  const body = document.getElementById('bs-body');
  if (tab === 'ing') {
    body.innerHTML = currentRecipe.ingredients.map(i =>
      `<div class="ing-row"><span class="ing-name">${i.name}</span><span class="ing-amt">${i.amount}</span></div>`
    ).join('');
  } else if (tab === 'steps') {
    body.innerHTML = currentRecipe.steps.map((s, i) => `
      <div class="step-item">
        <div class="step-num">${i+1}</div>
        <div style="flex:1">
          <div class="step-txt">${s.text}</div>
          ${s.tip ? `<div class="step-tip">💡 ${s.tip}</div>` : ''}
        </div>
      </div>`).join('');
  } else {
    body.innerHTML = `<div class="pt-card">${currentRecipe.points.map(p =>
      `<div class="pt-row"><span>${p}</span></div>`
    ).join('')}</div>`;
  }
}

// ========== PREP ==========
function renderPrep() {
  if (!currentData?.prep) return;
  const prep = currentData.prep;
  const allItems = [...(prep.makeAhead||[]), ...(prep.marinade||[]), ...(prep.cut||[])];
  const total = allItems.length;
  const checked = allItems.filter(i => prepChecked[i.id]).length;
  const pct = total > 0 ? Math.round(checked / total * 100) : 0;

  const secs = [
    { label:'🍱 作り置き', items: prep.makeAhead || [] },
    { label:'🧊 下味冷凍（ジップロック）', items: prep.marinade || [] },
    { label:'🔪 カット・下準備', items: prep.cut || [] },
  ];

  document.getElementById('prepContent').innerHTML = `
    <div class="prep-progress">
      <div class="prog-lbl"><span>仕込み進捗</span><span>${checked} / ${total} 完了</span></div>
      <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
    </div>
    ${secs.filter(s => s.items.length > 0).map(s => `
      <div class="prep-sec">
        <div class="prep-sec-ttl">${s.label}</div>
        ${s.items.map(item => `
          <div class="prep-item">
            <div class="prep-chk ${prepChecked[item.id]?'done':''}" onclick="togPrep('${item.id}')"></div>
            <div class="prep-body">
              ${item.days.map(d => `<span class="prep-daybadge">${d}曜に使用</span>`).join(' ')}
              <div class="prep-title ${prepChecked[item.id]?'done':''}">${item.title}</div>
              <div class="prep-desc">${item.desc}</div>
            </div>
          </div>`).join('')}
      </div>`).join('')}`;
}

function togPrep(id) { prepChecked[id] = !prepChecked[id]; renderPrep(); }

// ========== SHOP ==========
function renderShop() {
  if (!currentData) return;
  const totals = {};
  currentData.menus.forEach(m => {
    (m.ingredients || []).forEach(ing => {
      const amt = Math.round(ing.base);
      if (totals[ing.name]) totals[ing.name].amt += amt;
      else totals[ing.name] = { amt, cat: ing.cat };
    });
  });

  const cats = { '🥩 肉・魚': [], '🥦 野菜': [], '🧂 その他・調味料': [] };
  const catMap = { '肉・魚': '🥩 肉・魚', '野菜': '🥦 野菜', 'その他': '🧂 その他・調味料' };
  Object.entries(totals).forEach(([name, v]) => {
    (cats[catMap[v.cat]] || cats['🧂 その他・調味料']).push({ name, amt: v.amt });
  });

  document.getElementById('shopList').innerHTML = Object.entries(cats)
    .filter(([, items]) => items.length > 0)
    .map(([cat, items]) => `
      <div class="cat-sec">
        <div class="cat-lbl">${cat}</div>
        ${items.map(item => `
          <div class="shop-item">
            <span class="si-name">${item.name}</span>
            <span class="si-amt">${item.amt}g</span>
          </div>`).join('')}
      </div>`).join('');
}

// ========== COPY ==========
function copyAll() {
  if (!currentData) { showToast('先に献立を提案してください'); return; }
  let text = '【今週の献立】\n';
  currentData.menus.forEach(m => {
    text += `\n${m.day}曜\n  主食：${m.staple.name}\n  主菜：${m.main.name}\n  副菜：${m.side.name}\n  汁物：${m.soup.name}\n`;
  });

  const prep = currentData.prep;
  if (prep) {
    text += '\n【週末仕込みリスト】\n';
    [...(prep.makeAhead||[]),...(prep.marinade||[]),...(prep.cut||[])].forEach(p => {
      text += `${prepChecked[p.id]?'✅':'⬜'} ${p.title}\n`;
    });
  }

  text += '\n【買い物リスト】\n';
  document.querySelectorAll('#shopList .cat-sec').forEach(cat => {
    text += `\n${cat.querySelector('.cat-lbl').textContent}\n`;
    cat.querySelectorAll('.shop-item').forEach(item => {
      text += `・${item.querySelector('.si-name').textContent}…${item.querySelector('.si-amt').textContent}\n`;
    });
  });

  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✅ コピー済み'; btn.classList.add('done');
    setTimeout(() => { btn.innerHTML = '📋 コピー'; btn.classList.remove('done'); }, 2000);
    showToast('📋 クリップボードにコピーしました！');
  });
}

// ========== TOAST ==========
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
